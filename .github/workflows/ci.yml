name: CI

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]
    workflow_dispatch:

jobs:
    build-and-audit:
        name: Build, type-check, and audit axioms
        runs-on: ubuntu-latest
        timeout-minutes: 20

        steps:
            - name: Check out repository
              uses: actions/checkout@v4

            # `elan` reads `lean-toolchain` and installs the pinned Lean
            # version; no manual version selection here.
            - name: Install Lean toolchain via elan
              uses: leanprover/lean-action@v1
              with:
                  use-mathlib-cache: false
                  test: false
                  lint: false
                  build: false

            - name: Build main library
              run: lake build

            - name: Build tests library
              run: lake build Tests

            # Reproduces the axiom audit documented in README and
            # CONTRIBUTING. The four pure safety theorems must remain
            # zero-axiom; the PoS-derived layer must depend only on
            # propext and Quot.sound; Classical.choice and sorryAx
            # must never appear.
            - name: Audit axiom dependencies
              run: |
                  cat > AuditAxioms.lean <<'EOF'
                  import FocilLean4

                  #print axioms Focil.focil_one_of_n_protection
                  #print axioms Focil.focil_censorship_resistance
                  #print axioms Focil.censoring_block_not_canonical
                  #print axioms Focil.canonical_implies_compliant
                  #print axioms Focil.AttesterRun.toForkChoice
                  #print axioms Focil.focil_pos_derived_safety
                  EOF
                  OUTPUT=$(lake env lean AuditAxioms.lean)
                  echo "$OUTPUT"
                  # Forbidden axioms anywhere: Classical.choice and sorryAx.
                  if echo "$OUTPUT" | grep -E "Classical\.choice|sorryAx" >/dev/null; then
                    echo "::error::Classical.choice or sorryAx detected. Forbidden by project policy."
                    exit 1
                  fi
                  # The four pure safety theorems must remain zero-axiom.
                  for THM in \
                    "focil_one_of_n_protection" \
                    "focil_censorship_resistance" \
                    "censoring_block_not_canonical" \
                    "canonical_implies_compliant"; do
                    if ! echo "$OUTPUT" | grep -F "'Focil.$THM' does not depend on any axioms" >/dev/null; then
                      echo "::error::Focil.$THM no longer zero-axiom."
                      exit 1
                    fi
                  done
                  rm AuditAxioms.lean

            # Belt-and-braces sorry check independent of the axiom
            # audit (a `sorry` always surfaces as `sorryAx` above, so
            # this is redundant, but cheap, and a positive grep is
            # easier to read in CI logs than a `#print axioms` diff).
            - name: Confirm no `sorry` in any Lean source
              run: |
                  if grep -rn "sorry" --include="*.lean" .; then
                    echo "::error::Found 'sorry' in a Lean source file."
                    exit 1
                  fi
